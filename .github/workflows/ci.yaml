name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/sample-camel
  JAVA_VERSION: "17"

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-yaml ripgrep

      - name: Run validation script
        run: ./scripts/ci-validate.sh

  test-sample-camel:
    name: Test sample-camel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/sample-camel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Verify package build
        run: mvn -B -q package -DskipTests

  build-sample-camel-image:
    name: Build sample-camel image
    runs-on: ubuntu-latest
    needs: [validate, test-sample-camel]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Build image
        run: |
          podman build \
            --storage-driver vfs \
            -t "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}" \
            -t "${REGISTRY}/${IMAGE_NAME}:latest" \
            apps/sample-camel

      - name: Smoke test image
        run: |
          cid=$(podman run -d --storage-driver vfs -p 8080:8080 "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}")
          trap "podman rm -f ${cid}" EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/hello | grep -q 'Hello from sample-camel'; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test failed"
          podman logs "${cid}"
          exit 1

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          podman push --storage-driver vfs "${REGISTRY}/${IMAGE_NAME}:${{ github.sha }}"
          podman push --storage-driver vfs "${REGISTRY}/${IMAGE_NAME}:latest"
