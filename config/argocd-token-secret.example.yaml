# Example only — create the real secret in the cicd namespace; do not commit tokens.
#
# Generate a token:
#   argocd account generate-token --account cicd-bot
#
# Create the secret:
#   oc create secret generic argocd-token \
#     --from-literal=token=<token> \
#     -n cicd
apiVersion: v1
kind: Secret
metadata:
  name: argocd-token
  namespace: cicd
type: Opaque
stringData:
  token: REPLACE_WITH_ARGOCD_TOKEN
