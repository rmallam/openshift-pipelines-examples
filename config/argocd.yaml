# Argo CD configuration reference.
#
# Bootstrap (assumes Argo CD is already installed):
#   oc apply -f argocd/rbac/argocd-olm.yaml
#   oc apply -f argocd/root-application.yaml
#
# Full guide: docs/INSTALL.md

git:
  repoURL: https://github.com/rmallam/openshift-pipelines-examples.git
  targetRevision: main

argocd:
  namespace: argocd
  project: tekton

operator:
  subscriptionNamespace: openshift-operators
  targetNamespace: openshift-pipelines
  channel: latest

pipelines:
  namespace: cicd

imageRegistry: image-registry.openshift-image-registry.svc:5000

applications:
  root: tekton-root
  operator: openshift-pipelines-operator
  tektonPipelines: tekton-pipelines
  sampleCamelPrefix: sample-camel

environments:
  dev:
    namespace: sample-camel-dev
    kustomizePath: deploy/kustomize/overlays/dev
    image: sample-camel-dev/sample-camel
    argocdApp: sample-camel-dev
  staging:
    namespace: sample-camel-staging
    kustomizePath: deploy/kustomize/overlays/staging
    image: sample-camel-staging/sample-camel
    argocdApp: sample-camel-staging
  prod:
    namespace: sample-camel-prod
    kustomizePath: deploy/kustomize/overlays/prod
    image: sample-camel-prod/sample-camel
    argocdApp: sample-camel-prod
