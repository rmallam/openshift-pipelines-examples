apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: sample-camel-deploy-staging-
  labels:
    app.kubernetes.io/name: sample-camel
    app.kubernetes.io/environment: staging
    tekton.dev/pipeline: universal-deploy
spec:
  pipelineRef:
    name: universal-deploy
  serviceAccountName: pipeline-runner
  params:
    - name: git-url
      value: https://github.com/rmallam/openshift-pipelines-examples.git
    - name: git-revision
      value: main
    - name: deploy-mode
      value: yaml
    - name: deploy-path
      value: deploy/plain-yaml/overlays/staging
    - name: target-namespace
      value: sample-camel-staging
    - name: image
      value: image-registry.openshift-image-registry.svc:5000/sample-camel-staging/sample-camel:latest
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pipeline-workspace-pvc
