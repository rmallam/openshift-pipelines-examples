apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: tekton-webhook
  labels:
    app.kubernetes.io/part-of: tekton-pipelines
    app.kubernetes.io/component: triggers
spec:
  to:
    kind: Service
    name: el-tekton-webhook
    weight: 100
  port:
    targetPort: http-listener
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
