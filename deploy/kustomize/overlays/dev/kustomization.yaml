apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-camel-dev

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: dev

patches:
  - target:
      kind: Deployment
      name: sample-camel
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always

images:
  - name: sample-camel
    newName: image-registry.openshift-image-registry.svc:5000/sample-camel-dev/sample-camel
    newTag: latest
