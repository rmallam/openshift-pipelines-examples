apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sample-camel-prod

resources:
  - ../../base
  - route.yaml

commonLabels:
  app.kubernetes.io/environment: prod

patches:
  - target:
      kind: Deployment
      name: sample-camel
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

images:
  - name: sample-camel
    newName: image-registry.openshift-image-registry.svc:5000/sample-camel-prod/sample-camel
    newTag: latest
