apiVersion: v1
kind: Namespace
metadata:
  name: sample-camel-staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-camel
  namespace: sample-camel-staging
  labels:
    app.kubernetes.io/name: sample-camel
    app.kubernetes.io/environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-camel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-camel
        app.kubernetes.io/environment: staging
    spec:
      containers:
        - name: sample-camel
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-camel
  namespace: sample-camel-staging
spec:
  selector:
    app.kubernetes.io/name: sample-camel
  ports:
    - name: http
      port: 8080
      targetPort: http
