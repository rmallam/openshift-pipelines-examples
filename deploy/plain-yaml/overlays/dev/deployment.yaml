apiVersion: v1
kind: Namespace
metadata:
  name: sample-camel-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-camel
  namespace: sample-camel-dev
  labels:
    app.kubernetes.io/name: sample-camel
    app.kubernetes.io/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-camel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-camel
        app.kubernetes.io/environment: dev
    spec:
      containers:
        - name: sample-camel
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-camel
  namespace: sample-camel-dev
spec:
  selector:
    app.kubernetes.io/name: sample-camel
  ports:
    - name: http
      port: 8080
      targetPort: http
