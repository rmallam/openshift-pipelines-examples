# Bootstrap Application — apply once to hand control to Argo CD.
# Prerequisites: Argo CD installed, oc apply -f argocd/rbac/argocd-olm.yaml
#
#   oc apply -f argocd/root-application.yaml
#
# Full guide: docs/INSTALL.md
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tekton-pipelines
spec:
  project: default
  source:
    repoURL: https://github.com/rmallam/openshift-pipelines-examples.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      include: '{app-project/*,applications/*,applicationsets/*}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
