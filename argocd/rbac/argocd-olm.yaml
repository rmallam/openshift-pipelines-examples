# One-time RBAC so Argo CD can install OLM Subscriptions.
#
# Apply BEFORE bootstrapping tekton-root (requires cluster-admin):
#   oc apply -f argocd/rbac/argocd-olm.yaml
#
# Adjust the subject namespace if Argo CD is not in "argocd".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-olm-subscription-manager
  labels:
    app.kubernetes.io/part-of: tekton-pipelines
rules:
  - apiGroups: ["operators.coreos.com"]
    resources:
      - subscriptions
      - installplans
      - clusterserviceversions
      - catalogsources
      - operatorgroups
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["packages.operators.coreos.com"]
    resources: ["packagemanifests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["operator.tekton.dev"]
    resources: ["tektonconfigs", "tektoninstallersets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-olm-subscription-manager
  labels:
    app.kubernetes.io/part-of: tekton-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-olm-subscription-manager
subjects:
  - kind: ServiceAccount
    name: argocd-application-controller
    namespace: argocd
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
